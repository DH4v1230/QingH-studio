# ============================================================
# QingH Studio — Cloudflare Wrangler 配置
# ============================================================
name = "qingh-studio"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ---- D1 数据库绑定 ----
[[d1_databases]]
binding = "DB"
database_name = "qingh-db"
database_id = "YOUR_D1_DATABASE_ID"   # 创建 D1 后替换

# ---- 路由（绑定到自定义域名或 workers.dev 子域名）----
# route = "api.yourdomain.com/*"

# ---- 环境变量（可选）----
[vars]
JWT_SECRET = "your-jwt-secret-change-me"

# ---- 免费套餐限制 ----
# Workers Free: 10万请求/天, 10ms CPU/请求
# D1 Free: 5GB存储, 500万行读取/天, 10万行写入/天
# 足够支撑数千用户

# ---- 生产环境配置示例 ----
# [env.production]
# route = "api.yourdomain.com/*"
