function appendBubble(role,content,msgIndex){
  const d=document.createElement('div');d.className=`message ${role}`;
  if(msgIndex!==undefined) d.dataset.msgIndex=msgIndex;
  const a=document.createElement('div');a.className='message-avatar';a.textContent=role==='user'?'👤':'🤖';
  const b=document.createElement('div');b.className='message-bubble';
  if(role==='assistant'&&state.mode==='novel') b.classList.add('novel-content');
  try{b.innerHTML=marked.parse(content,{breaks:true,gfm:true})}catch(e){b.textContent=content}

  // Message actions bar below bubble
  const actions=document.createElement('div');actions.className='msg-actions';

  if(role==='user'&&msgIndex!==undefined){
    const editBtn=document.createElement('button');
    editBtn.className='highlight';editBtn.innerHTML='✎ 编辑';editBtn.title='编辑并重新发送';
    editBtn.addEventListener('click',e=>{e.stopPropagation();editUserMessage(msgIndex)});
    actions.appendChild(editBtn);
  }

  if(role==='assistant'){
    const hasNote=state.supNote&&state.supNote.trim();
    const suppBtn=document.createElement('button');
    suppBtn.innerHTML='📝 补设';
    if(hasNote) suppBtn.classList.add('supp-has');
    suppBtn.title='添加补充设定，AI 将牢记并在后续回复中遵循';
    suppBtn.addEventListener('click',e=>{e.stopPropagation();dom.supInput.focus()});
    actions.appendChild(suppBtn);
  }

  d.append(a,b,actions);dom.chatContainer.appendChild(d);
}
function scrollBottom(){requestAnimationFrame(()=>{dom.chatContainer.scrollTop=dom.chatContainer.scrollHeight})}

// ==================== SETTINGS ====================
function openSettings(){
  if(isMobile()) closeSidebar();
  dom.apiProvider.value=state.apiProvider;dom.apiKeyInput.value=state.apiKey;
  dom.apiKeyInput.placeholder=PROVIDERS[state.apiProvider]?.keyPlaceholder||'';
  dom.baiduSecretKey.value=state.baiduSecretKey;dom.customApiUrl.value=state.customApiUrl;
  updateModelSelect();dom.baiduSecretGroup.style.display=state.apiProvider==='baidu'?'block':'none';
  dom.customUrlGroup.style.display=state.apiProvider==='custom'?'block':'none';
  dom.testResult.textContent='';dom.settingsModal.style.display='flex';
}
function closeSettings(){dom.settingsModal.style.display='none';dom.testResult.textContent=''}
function saveSettings(){
  const k=dom.apiKeyInput.value.trim(),p=dom.apiProvider.value;
  if(!k){toast('请输入 API Key','error');return}
  if(p==='baidu'&&!dom.baiduSecretKey.value.trim()){toast('百度需要 Secret Key','error');return}
  if(p==='custom'&&!dom.customApiUrl.value.trim()){toast('自定义接口需要地址','error');return}
  state.apiKey=k;state.apiProvider=p;state.baiduSecretKey=dom.baiduSecretKey.value.trim();
  state.customApiUrl=dom.customApiUrl.value.trim();state.model=dom.modelSelect.value;
  state.baiduAccessToken=null;state.baiduTokenExpiry=0;
  saveAll();updateUI();closeSettings();
  // Sync API key to cloud
  if (authToken) {
    cloudFetch('/user/api-key', {
      method: 'PUT',
      body: JSON.stringify({ api_key: k, api_provider: p, model: state.model, baidu_secret_key: state.baiduSecretKey, custom_api_url: state.customApiUrl })
    }).catch(() => {});
  }
  toast('设置已保存 ✅','success');
}

// ==================== FILE UPLOAD ====================
function renderFileChips(){
  dom.fileChipsRow.innerHTML='';
  state.uploadedFiles.forEach(f=>{
    const c=document.createElement('div');c.className='file-chip';
    c.title=`${f.name} (${fmtSize(f.size)})`;
    c.innerHTML=`<span class="chip-icon">${fIcon(f.name)}</span><span class="chip-name">${esc(f.name)}</span><span class="chip-size">${fmtSize(f.size)}</span><button class="chip-remove" data-fid="${f.id}">×</button>`;
    c.querySelector('.chip-remove').addEventListener('click',()=>{state.uploadedFiles=state.uploadedFiles.filter(x=>x.id!==f.id);saveAll();renderFileChips();updateUI();toast('文件已移除','info')});
    dom.fileChipsRow.appendChild(c);
  });
}
function fIcon(n){const x=n.split('.').pop().toLowerCase();return{pdf:'📕',docx:'📘',doc:'📘',txt:'📄',md:'📝',json:'📋',csv:'📊',xml:'📰',yaml:'⚙️',yml:'⚙️',html:'🌐',css:'🎨',js:'📜',ts:'📜',py:'🐍',rb:'💎',go:'🔵',rs:'🦀',java:'☕',log:'📋'}[x]||'📎'}
function fmtSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function handleFiles(files){
  for(const f of files){
    if(f.size>20*1024*1024){toast(`"${f.name}" 超过20MB`,'error');continue}
    const id='f_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    state.uploadedFiles.push({id,name:f.name,content:'',size:f.size,type:f.type});
    saveAll();renderFileChips();updateUI();
    try{
      let txt='';const ext=f.name.split('.').pop().toLowerCase();
      if(ext==='pdf') txt=await parsePDF(f);
      else if(ext==='docx') txt=await parseDOCX(f);
      else if(ext==='doc'){toast(`"${f.name}": .doc 请另存为 .docx`,'error');state.uploadedFiles=state.uploadedFiles.filter(x=>x.id!==id);continue}
      else txt=await readText(f);
      if(!txt||!txt.trim()){toast(`"${f.name}": 无内容`,'error');state.uploadedFiles=state.uploadedFiles.filter(x=>x.id!==id);continue}
      if(txt.length>180000){txt=txt.slice(0,180000)+'\n\n[... 已截断 ...]';toast(`"${f.name}": 已截断`,'info')}
      const obj=state.uploadedFiles.find(x=>x.id===id);if(obj)obj.content=txt;
      saveAll();renderFileChips();updateUI();toast(`"${f.name}" ✅`,'success');
    }catch(e){toast(`"${f.name}": ${e.message}`,'error');state.uploadedFiles=state.uploadedFiles.filter(x=>x.id!==id)}
  }
}
function readText(f){return new Promise((ok,err)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=()=>err(new Error('读取失败'));r.readAsText(f,'UTF-8')})}
async function parsePDF(f){
  if(typeof pdfjsLib==='undefined'){await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'}
  const pdf=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;const ts=[];
  for(let i=1;i<=pdf.numPages;i++){const p=await pdf.getPage(i);const c=await p.getTextContent();ts.push(c.items.map(it=>it.str).join(' '))}
  return ts.join('\n\n');
}
async function parseDOCX(f){
  if(typeof mammoth==='undefined') await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js');
  const r=await mammoth.extractRawText({arrayBuffer:await f.arrayBuffer()});return r.value;
}
function loadScript(s){return new Promise((ok,err)=>{const t=document.createElement('script');t.src=s;t.onload=ok;t.onerror=()=>err(new Error(`加载失败: ${s}`));document.head.appendChild(t)})}

// ==================== UTILS ====================
function toast(msg,type='info'){
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  dom.toastContainer.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(40px)';t.style.transition='.3s ease';setTimeout(()=>t.remove(),300)},3500);
}
function confirm(msg,cb){
  dom.confirmMsg.textContent=msg;dom.confirmModal.style.display='flex';_confirmCallback=cb;
}
function closeConfirm(){dom.confirmModal.style.display='none';_confirmCallback=null}

// ==================== EVENTS ====================
function bindEvents(){
  // ---- Cloud / Auth events ----
  dom.btnShowAuth.addEventListener('click', () => openAuthModal('login'));
  dom.tabLogin.addEventListener('click', () => switchAuthTab('login'));
  dom.tabRegister.addEventListener('click', () => switchAuthTab('register'));
  dom.btnLogin.addEventListener('click', doLogin);
  dom.btnRegister.addEventListener('click', doRegister);
  dom.btnCloseAuth.addEventListener('click', closeAuthModal);
  dom.btnCloseAuth2.addEventListener('click', closeAuthModal);
  dom.authModal.addEventListener('click', e => { if (e.target === dom.authModal) closeAuthModal(); });
  dom.btnLogout.addEventListener('click', doLogout);

  // Enter key in auth inputs
  [dom.loginEmail, dom.loginPassword].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
  [dom.regEmail, dom.regPassword, dom.regPassword2].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  });

  // Sessions
  dom.btnNewSession.addEventListener('click', () => createCloudSession('新的对话', state.mode));

  // ---- Message ----
  // Send — click button OR Enter (Ctrl+Enter = newline)
  dom.btnSend.addEventListener('click',()=>{state.isLoading?stopGeneration():sendMessage()});
  dom.userInput.addEventListener('keydown',e=>{
    // Enter only → send; Ctrl+Enter → newline
    if(e.key==='Enter'){
      if(e.ctrlKey||e.metaKey){
        e.preventDefault();
        const ta=dom.userInput, s=ta.selectionStart, v=ta.value;
        ta.value=v.slice(0,s)+'\n'+v.slice(ta.selectionEnd);
        ta.selectionStart=ta.selectionEnd=s+1;
        ta.dispatchEvent(new Event('input'));
      }else{
        e.preventDefault();
        sendMessage();
      }
    }
  });
  dom.userInput.addEventListener('input',()=>{dom.userInput.style.height='auto';dom.userInput.style.height=Math.min(dom.userInput.scrollHeight,dom.userInput.classList.contains('expanded')?420:180)+'px'});

  // Click textarea border area to expand/collapse
  dom.userInput.addEventListener('click',function(e){
    const ta=this;const box=ta.parentElement;
    const rect=box.getBoundingClientRect();
    // If click is on the padding/border area (not directly on textarea text), toggle expand
    if(e.target===ta&&(e.offsetY>ta.scrollHeight+10||e.offsetX>ta.clientWidth-30)){
      ta.classList.toggle('expanded');
      ta.style.height='auto';
      ta.style.height=Math.min(ta.scrollHeight,ta.classList.contains('expanded')?420:180)+'px';
      ta.focus();
    }
  });

  // Expandable modal textareas
  document.addEventListener('click',e=>{
    const ta=e.target.closest('textarea.expandable');
    if(ta&&ta===e.target){ta.classList.toggle('expanded')}
  });

  // Attach
  dom.btnAttach.addEventListener('click',()=>dom.fileInput.click());
  dom.fileInput.addEventListener('change',()=>{if(dom.fileInput.files.length){handleFiles(dom.fileInput.files);dom.fileInput.value=''}});
  dom.chatContainer.addEventListener('dragover',e=>{e.preventDefault();dom.chatContainer.style.outline='2px dashed var(--accent)';dom.chatContainer.style.outlineOffset='-4px'});
  dom.chatContainer.addEventListener('dragleave',()=>{dom.chatContainer.style.outline=''});
  dom.chatContainer.addEventListener('drop',e=>{e.preventDefault();dom.chatContainer.style.outline='';if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files)});

  // World
  dom.btnAddWorld.addEventListener('click',()=>openWorldModal(null));
  dom.btnImportWorld.addEventListener('click',()=>{if(isMobile())closeSidebar();dom.worldFileInput.click()});
  dom.worldFileInput.addEventListener('change',async ()=>{if(dom.worldFileInput.files.length){try{await importWorldFromFile(dom.worldFileInput.files[0])}catch(e){toast('导入失败: '+e.message,'error')}dom.worldFileInput.value=''}});
  dom.btnSaveWorld.addEventListener('click',saveWorld);
  dom.btnCancelWorld.addEventListener('click',closeWorldModal);
  dom.btnDeleteWorld.addEventListener('click',()=>{const id=dom.worldEditId.value;closeWorldModal();if(id)deleteWorld(id)});
  dom.worldModal.addEventListener('click',e=>{if(e.target===dom.worldModal)closeWorldModal()});
  dom.awClear.addEventListener('click',()=>selectWorld(state.activeWorldId));

  // Char
  dom.btnAddChar.addEventListener('click',()=>openCharModal(null));
  dom.btnImportChar.addEventListener('click',()=>{if(isMobile())closeSidebar();dom.charFileInput.click()});
  dom.charFileInput.addEventListener('change',async ()=>{if(dom.charFileInput.files.length){try{await importCharFromFile(dom.charFileInput.files[0])}catch(e){toast('导入失败: '+e.message,'error')}dom.charFileInput.value=''}});
  dom.btnSaveChar.addEventListener('click',saveChar);
  dom.btnCancelChar.addEventListener('click',closeCharModal);
  dom.btnDeleteChar.addEventListener('click',()=>{const id=dom.charEditId.value;closeCharModal();if(id)deleteChar(id)});
  dom.charModal.addEventListener('click',e=>{if(e.target===dom.charModal)closeCharModal()});

  // Settings
  dom.btnSettings.addEventListener('click',openSettings);
  dom.btnCloseSettings.addEventListener('click',closeSettings);
  dom.btnSaveSettings.addEventListener('click',saveSettings);
  dom.btnTestConnection.addEventListener('click',testConnection);
  dom.settingsModal.addEventListener('click',e=>{if(e.target===dom.settingsModal)closeSettings()});
  dom.apiProvider.addEventListener('change',()=>{
    const p=PROVIDERS[dom.apiProvider.value];
    dom.baiduSecretGroup.style.display=dom.apiProvider.value==='baidu'?'block':'none';
    dom.customUrlGroup.style.display=dom.apiProvider.value==='custom'?'block':'none';
    dom.apiKeyInput.placeholder=p?.keyPlaceholder||'';
    if(p){dom.modelSelect.innerHTML=p.models.map(m=>`<option value="${m.v}">${m.l}</option>`).join('');dom.modelSelect.value=p.defaultModel}
    dom.testResult.textContent='';
  });

  // Supplement bar
  document.getElementById('spAdd').addEventListener('click',saveSupNote);
  document.getElementById('spClearAll').addEventListener('click',clearAllSupNotes);
  dom.supInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();saveSupNote()}});

  // Export & Clear
  dom.btnExport.addEventListener('click',exportTXT);
  dom.btnClear.addEventListener('click',clearChat);

  // Confirm
  dom.btnConfirmYes.addEventListener('click',()=>{if(_confirmCallback)_confirmCallback();closeConfirm()});
  dom.btnConfirmNo.addEventListener('click',closeConfirm);
  dom.confirmModal.addEventListener('click',e=>{if(e.target===dom.confirmModal)closeConfirm()});

  // Mobile sidebar
  dom.hamburgerBtn.addEventListener('click',toggleSidebar);
  dom.hamburgerBtn2.addEventListener('click',toggleSidebar);
  dom.sidebarCloseBtn.addEventListener('click',closeSidebar);
  dom.sidebarBackdrop.addEventListener('click',closeSidebar);

  // Close sidebar on world select (mobile)
  ['worldList','charList'].forEach(id=>{
    document.getElementById(id).addEventListener('click',e=>{
      if(e.target.closest('.item-row')||e.target.closest('.archive-group')||e.target.closest('.sub-item')){
        if(isMobile()) closeSidebar();
      }
    });
  });

  // Global
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      if(dom.sidebar.classList.contains('open')){closeSidebar();return}
      if(dom.settingsModal.style.display==='flex')closeSettings();
      if(dom.worldModal.style.display==='flex')closeWorldModal();
      if(dom.charModal.style.display==='flex')closeCharModal();
      if(dom.confirmModal.style.display==='flex')closeConfirm();
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();dom.userInput.focus()}
  });
}

document.addEventListener('DOMContentLoaded',init);
</script>
