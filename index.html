<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover,shrink-to-fit=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QingH Studio">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f14">
<meta name="format-detection" content="telephone=no">
<meta name="HandheldFriendly" content="true">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='36' fill='%230f0f14'/><text x='90' y='110' text-anchor='middle' font-size='80' fill='white'>✨</text></svg>">
<title>QingH Studio — 小说创作 & 智能对话</title>
<style>
/* ===== VARIABLES ===== */
:root{
  --bg:#0f0f14; --surface:#1a1a24; --surface-2:#22222e; --surface-3:#2a2a38;
  --border:#2e2e3e; --text:#e8e8f0; --text-secondary:#9a9ab0; --text-muted:#6b6b80;
  --accent:#7c5cfc; --accent-glow:rgba(124,92,252,0.3); --accent-2:#f062a6;
  --success:#4ade80; --warning:#fbbf24; --error:#f87171;
  --radius-sm:8px; --radius:12px; --radius-lg:16px; --radius-xl:20px;
  --shadow:0 2px 8px rgba(0,0,0,.3); --shadow-lg:0 8px 32px rgba(0,0,0,.4);
  --transition:0.2s cubic-bezier(.4,0,.2,1);
  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code','Consolas',monospace;
  --font-sans:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  --sidebar-w:280px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
  --touch-target:44px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
button,a,select,input[type="file"]{cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-overflow-scrolling:touch;touch-action:manipulation}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* ===== APP LAYOUT ===== */
.app-layout{display:flex;height:100vh;height:100dvh;overscroll-behavior:none}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:20;
  overflow-y:auto;overflow-x:hidden;
  overscroll-behavior:contain;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}

/* Hamburger button — hidden on desktop */
.hamburger{
  display:none;align-items:center;justify-content:center;
  width:var(--touch-target);height:var(--touch-target);
  border:none;background:transparent;color:var(--text);
  cursor:pointer;font-size:1.3rem;flex-shrink:0;
  border-radius:50%;transition:var(--transition);
  -webkit-tap-highlight-color:transparent;
}
.hamburger:active{background:var(--surface-3)}

/* Sidebar close button — hidden on desktop */
.sidebar-header .hamburger-close{display:none}

/* Sidebar backdrop — hidden on desktop */
.sidebar-backdrop{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:19;animation:fadeIn .2s ease;
  -webkit-tap-highlight-color:transparent;
}

.sidebar-header{
  display:flex;align-items:center;gap:10px;
  padding:16px 18px;flex-shrink:0;
  font-weight:700;font-size:1.1rem;letter-spacing:-0.3px;
  border-bottom:1px solid var(--border);
}
.sidebar-header svg{flex-shrink:0}

/* Sidebar sections */
.sidebar-section{flex-shrink:0;padding:4px 0;border-bottom:1px solid var(--border)}
.sidebar-section:last-of-type{border-bottom:none}

.section-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px 6px;
  font-size:.75rem;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.5px;
}
.section-header > div{display:flex;gap:4px}
.section-header button{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text-secondary);cursor:pointer;
  font-size:.85rem;line-height:1;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);padding:0;
}
.section-header button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* World / Character list items */
.item-list{padding:2px 10px 8px}
.item-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);font-size:.82rem;
  position:relative;
}
.item-row:hover{background:var(--surface-2)}
.item-row.active{background:var(--surface-3);outline:1px solid var(--accent)}
.item-row .expand-arrow{display:none}

.item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.item-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.item-meta{font-size:.68rem;color:var(--text-muted);flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:var(--transition)}
.item-row:hover .item-actions{opacity:1}
.item-actions button{
  width:22px;height:22px;border-radius:50%;border:none;
  background:transparent;color:var(--text-muted);cursor:pointer;
  font-size:.65rem;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);
}
.item-actions button:hover{background:var(--surface-3);color:var(--text)}
.item-actions button.del:hover{background:rgba(248,113,113,.2);color:var(--error)}

/* Archive group row in character section */
.archive-group{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;border-radius:var(--radius-sm);
  cursor:pointer;transition:var(--transition);font-size:.8rem;
  margin-top:2px;
}
.archive-group:hover{background:var(--surface-2)}
.archive-group .ag-bar{width:3px;min-height:28px;border-radius:2px;flex-shrink:0;align-self:stretch}
.archive-group .ag-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.archive-group .ag-count{font-size:.68rem;color:var(--text-muted);flex-shrink:0}

/* Nested sub-items under an archive group */
.sub-items{padding-left:20px;overflow:hidden;transition:max-height .3s ease;max-height:0}
.sub-items.open{max-height:500px}
.sub-item{
  display:flex;align-items:center;gap:7px;
  padding:4px 8px;border-radius:var(--radius-sm);
  cursor:default;transition:var(--transition);font-size:.74rem;
}
.sub-item:hover{background:var(--surface-2)}
.sub-item .sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sub-item .sub-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-secondary)}
.sub-item .sub-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:var(--transition)}
.sub-item:hover .sub-actions{opacity:1}
.sub-item .sub-actions button{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.sub-item .sub-actions button:hover{background:var(--surface-3);color:var(--text)}
.sub-item .sub-actions button.del:hover{background:rgba(248,113,113,.2);color:var(--error)}

.empty-hint{text-align:center;padding:12px;font-size:.75rem;color:var(--text-muted)}

/* Sidebar footer */
.sidebar-footer{
  margin-top:auto;flex-shrink:0;
  display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);
}
.sidebar-footer button{
  flex:1;padding:8px 0;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface-2);color:var(--text-secondary);cursor:pointer;
  font-size:.78rem;transition:var(--transition);font-family:var(--font-sans);
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.sidebar-footer button:hover{background:var(--surface-3);color:var(--text)}
.sidebar-footer button.accent:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== MAIN AREA ===== */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* Active world indicator */
.active-world-bar{
  display:flex;align-items:center;gap:8px;
  padding:6px 20px;font-size:.78rem;color:var(--text-secondary);
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
  min-height:36px;
}
.active-world-bar .aw-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.active-world-bar .aw-name{font-weight:500;color:var(--text)}
.active-world-bar .aw-chars{font-size:.7rem;color:var(--text-muted);margin-left:4px}
.active-world-bar .aw-clear{margin-left:auto;font-size:.7rem;color:var(--text-muted);cursor:pointer;border:none;background:none;padding:2px 8px;border-radius:50px;transition:var(--transition)}
.active-world-bar .aw-clear:hover{color:var(--error);background:rgba(248,113,113,.1)}

/* Chat container */
.chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:12px}
.welcome-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:4px;box-shadow:0 8px 32px var(--accent-glow)}
.welcome h2{font-size:1.4rem;font-weight:600}
.welcome p{color:var(--text-secondary);max-width:500px;line-height:1.6;font-size:.9rem}

/* Messages */
.message{display:flex;gap:12px;max-width:860px;width:100%;margin:0 auto;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{flex-direction:row-reverse}
.message-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;font-weight:600}
.message.user .message-avatar{background:var(--accent);color:#fff}
.message.assistant .message-avatar{background:linear-gradient(135deg,var(--accent-2),#f59e0b);color:#fff}

.message-bubble{padding:13px 17px;border-radius:var(--radius-lg);line-height:1.65;font-size:.93rem;word-break:break-word;overflow-wrap:break-word}
.message.user .message-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:6px;font-family:var(--font-sans)}
.message.assistant .message-bubble{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:6px}

.message-bubble p{margin-bottom:9px}.message-bubble p:last-child{margin-bottom:0}
.message-bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;overflow-x:auto;font-family:var(--font-mono);font-size:.83rem;margin:9px 0;line-height:1.5}
.message-bubble code{font-family:var(--font-mono);font-size:.85em;background:rgba(255,255,255,.08);padding:2px 5px;border-radius:4px}
.message-bubble pre code{background:none;padding:0}
.message-bubble ul,.message-bubble ol{margin:7px 0;padding-left:22px}
.message-bubble li{margin:3px 0}
.message-bubble blockquote{border-left:3px solid var(--accent);padding-left:13px;margin:9px 0;color:var(--text-secondary)}
.message-bubble h1,.message-bubble h2,.message-bubble h3{margin:11px 0 5px}
.message-bubble h1{font-size:1.25rem}.message-bubble h2{font-size:1.1rem}.message-bubble h3{font-size:1rem}

.message.assistant .message-bubble.novel-content{font-family:'Noto Serif SC','Source Han Serif SC','STSong',Georgia,serif;line-height:1.9;font-size:.98rem;letter-spacing:.3px}
.novel-content p{text-indent:2em;margin-bottom:13px}

/* Typing */
.typing-indicator{display:flex;gap:4px;padding:6px 0}
.typing-indicator span{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:bounce 1.4s infinite ease-in-out both}
.typing-indicator span:nth-child(1){animation-delay:-.32s}.typing-indicator span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Input */
.input-area{padding:12px 20px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-wrapper{max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.file-chips-row{display:flex;flex-wrap:wrap;gap:6px}
.file-chip{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 8px;background:var(--surface-3);border:1px solid var(--border);border-radius:50px;font-size:.78rem;color:var(--text-secondary);animation:fadeIn .25s ease;max-width:260px}
.file-chip .chip-icon{font-size:.85rem;flex-shrink:0}
.file-chip .chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-chip .chip-size{color:var(--text-muted);font-size:.7rem;flex-shrink:0;margin-left:2px}
.file-chip .chip-remove{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:none;background:var(--surface-2);color:var(--text-muted);cursor:pointer;font-size:.7rem;transition:var(--transition);flex-shrink:0}
.file-chip .chip-remove:hover{background:rgba(248,113,113,.2);color:var(--error)}

.input-row{display:flex;gap:8px;align-items:flex-end}
.input-box{flex:1;display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);transition:var(--transition);overflow:hidden;position:relative}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input-box textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:var(--font-sans);font-size:.93rem;padding:13px 15px;resize:none;outline:none;line-height:1.5;min-height:50px;max-height:180px;transition:max-height .3s ease}
.input-box textarea::placeholder{color:var(--text-muted)}
.input-box textarea.expanded{max-height:420px!important}
.input-expand-hint{position:absolute;right:10px;bottom:4px;font-size:.65rem;color:var(--text-muted);pointer-events:none;opacity:.5;transition:opacity .2s}
.input-box:focus-within .input-expand-hint{opacity:0}

/* Expandable modal textareas */
.form-group textarea.expandable{cursor:pointer;transition:min-height .3s ease,height .3s ease}
.form-group textarea.expandable.expanded{min-height:200px!important}

.send-btn{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border:none;border-radius:50%;background:var(--accent);color:#fff;cursor:pointer;transition:var(--transition);flex-shrink:0;box-shadow:0 4px 16px var(--accent-glow);font-size:1.1rem}
.send-btn:hover{background:#9178ff;transform:scale(1.05)}.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}.send-btn:disabled:hover{background:var(--accent)}
.send-btn.stop{background:var(--error);box-shadow:0 4px 16px rgba(248,113,113,.4);animation:pulse-stop 1.5s ease-in-out infinite}
.send-btn.stop:hover{background:#ef4444}
@keyframes pulse-stop{0%,100%{box-shadow:0 4px 16px rgba(248,113,113,.4)}50%{box-shadow:0 4px 28px rgba(248,113,113,.7)}}
.attach-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid var(--border);border-radius:50%;background:var(--surface-2);color:var(--text-secondary);cursor:pointer;transition:var(--transition);flex-shrink:0;font-size:1.1rem}
.attach-btn:hover{background:var(--surface-3);color:var(--text);border-color:var(--text-muted)}

/* Message action buttons — below bubble */
.msg-actions{display:flex;gap:4px;margin-top:4px;opacity:0;transition:opacity .2s}
.message.user .msg-actions{justify-content:flex-end}
.message.assistant .msg-actions{justify-content:flex-start}
.message:hover .msg-actions{opacity:1}
.msg-actions button{
  padding:3px 10px;border-radius:50px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text-muted);cursor:pointer;
  font-size:.7rem;font-family:var(--font-sans);transition:var(--transition);
  display:flex;align-items:center;gap:3px;
}
.msg-actions button:hover{background:var(--surface-3);color:var(--text);border-color:var(--text-muted)}
.msg-actions button.highlight:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.msg-actions button.supp-has{color:var(--accent-2);border-color:rgba(240,98,166,.3)}

/* Supplement bar — always visible, scrollable chip row */
.sup-bar{
  display:flex;align-items:center;gap:12px;
  padding:6px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
  max-height:130px;overflow-y:auto;overflow-x:hidden;
}
.sup-bar .sup-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
.sup-bar .sup-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text-muted)}
.sup-bar.has .sup-dot{background:var(--accent-2);box-shadow:0 0 8px rgba(240,98,166,.5)}
.sup-bar .sup-label{font-size:.78rem;color:var(--text-muted);white-space:nowrap}
.sup-bar.has .sup-label{color:var(--accent-2)}
.sup-bar .sup-right{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.sup-bar .sup-chips-row{display:flex;gap:5px;flex-wrap:wrap;align-items:flex-start}
.sup-bar .sup-chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:50px;
  background:var(--surface-3);border:1px solid var(--border);
  font-size:.74rem;color:var(--text-secondary);max-width:260px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;transition:var(--transition);
  flex-shrink:0;
}
.sup-bar .sup-chip:hover{background:var(--surface-2);border-color:var(--text-muted);color:var(--text)}
.sup-bar .sup-chip .sc-text{overflow:hidden;text-overflow:ellipsis}
.sup-bar .sup-chip .sc-del{
  width:16px;height:16px;border-radius:50%;border:none;
  background:transparent;color:var(--text-muted);cursor:pointer;
  font-size:.65rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:2px;transition:var(--transition);
}
.sup-bar .sup-chip .sc-del:hover{background:rgba(248,113,113,.2);color:var(--error)}

/* Inline editing of a chip */
.sup-bar .sup-chip.editing{
  background:var(--surface-2);border-color:var(--accent);
  cursor:default;max-width:none;overflow:visible;
}
.sup-bar .sup-chip.editing input{
  width:260px;padding:2px 6px;background:var(--surface-3);
  border:1px solid var(--accent);border-radius:50px;
  color:var(--text);font-size:.74rem;outline:none;font-family:var(--font-sans);
}
.sup-bar .sup-chip.editing input:focus{outline:none}
.sup-bar .sup-chip.editing .sc-ok,
.sup-bar .sup-chip.editing .sc-cancel{
  width:18px;height:18px;border-radius:50%;border:none;
  font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:var(--transition);
}
.sup-bar .sup-chip.editing .sc-ok{background:var(--accent);color:#fff}
.sup-bar .sup-chip.editing .sc-ok:hover{background:#9178ff}
.sup-bar .sup-chip.editing .sc-cancel{background:transparent;color:var(--text-muted)}
.sup-bar .sup-chip.editing .sc-cancel:hover{color:var(--text);background:var(--surface-3)}

/* Add-new row */
.sup-bar .sup-add-row{display:flex;gap:5px;align-items:center;padding-bottom:2px}
.sup-bar .sup-add-row input{
  width:240px;padding:5px 12px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:50px;
  color:var(--text);font-size:.8rem;outline:none;font-family:var(--font-sans);
  transition:var(--transition);
}
.sup-bar .sup-add-row input:focus{border-color:var(--accent);width:340px}
.sup-bar .sup-add-row button{
  width:28px;height:28px;border-radius:50%;border:none;
  background:var(--accent);color:#fff;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:var(--transition);
}
.sup-bar .sup-add-row button:hover{background:#9178ff}
.sup-bar .sup-clear-all{
  color:var(--text-muted);cursor:pointer;border:none;background:none;
  font-size:.65rem;flex-shrink:0;padding:2px 6px;border-radius:50px;
  transition:var(--transition);font-family:var(--font-sans);margin-left:auto;
}
.sup-bar .sup-clear-all:hover{color:var(--error);background:rgba(248,113,113,.1)}

/* Context bar */
.context-bar{display:flex;align-items:center;gap:10px;padding:4px 20px;font-size:.72rem;color:var(--text-muted);justify-content:center;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.context-bar span{display:flex;align-items:center;gap:4px}
.context-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.context-dot.on{background:var(--success)}.context-dot.off{background:var(--text-muted)}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s ease;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:26px 28px;max-width:520px;width:92%;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-size:1.1rem;margin-bottom:14px}
.modal p{color:var(--text-secondary);font-size:.84rem;margin-bottom:14px;line-height:1.5}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;font-weight:500;margin-bottom:5px;color:var(--text-secondary)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 13px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.87rem;transition:var(--transition);outline:none;font-family:var(--font-sans)}
.form-group input[type="text"],.form-group input[type="password"]{font-family:var(--font-mono)}
.form-group textarea{resize:vertical;min-height:80px;line-height:1.6;font-size:.84rem}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.form-row{display:flex;gap:10px}.form-row .form-group{flex:1}

/* Color picker */
.color-picker{display:flex;gap:6px;flex-wrap:wrap}
.color-picker input[type="radio"]{display:none}
.color-picker label{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.color-picker input[type="radio"]:checked+label{border-color:#fff;box-shadow:0 0 10px currentColor;transform:scale(1.15)}

.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn{padding:9px 20px;border-radius:50px;border:none;cursor:pointer;font-size:.86rem;font-weight:500;transition:var(--transition);font-family:var(--font-sans)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}.btn-primary:hover{background:#9178ff}
.btn-secondary{background:var(--surface-3);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--surface-2)}
.btn-danger{background:transparent;color:var(--error);border:1px solid rgba(248,113,113,.3)}.btn-danger:hover{background:rgba(248,113,113,.1)}
.btn-sm{padding:6px 14px;font-size:.78rem}
.btn-xs{padding:3px 10px;font-size:.7rem;border-radius:50px}

/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:var(--radius-sm);font-size:.84rem;font-weight:500;animation:slideIn .3s ease;box-shadow:var(--shadow-lg);max-width:400px}
.toast.success{background:#064e3b;color:var(--success);border:1px solid rgba(74,222,128,.3)}
.toast.error{background:#450a0a;color:var(--error);border:1px solid rgba(248,113,113,.3)}
.toast.info{background:#1e1b4b;color:#a5b4fc;border:1px solid rgba(165,180,252,.3)}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ===== CLOUD / AUTH STYLES ===== */
.user-area{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.user-area .user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;flex-shrink:0}
.user-area .user-info{flex:1;min-width:0}
.user-area .user-email{font-size:.78rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-area .user-vip{font-size:.62rem;color:var(--text-muted)}
.user-area .user-vip.vip{color:#f59e0b;font-weight:600}
.user-area .user-logout{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.user-area .user-logout:hover{background:rgba(248,113,113,.15);color:var(--error);border-color:var(--error)}
.login-prompt{text-align:center;padding:12px 10px;font-size:.74rem;color:var(--text-muted)}
.login-prompt button{display:block;width:100%;margin-top:6px;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--accent);background:var(--accent);color:#fff;cursor:pointer;font-size:.8rem;transition:var(--transition);font-family:var(--font-sans)}
.login-prompt button:hover{background:#9178ff}

/* Session list */
.session-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:.82rem}
.session-item:hover{background:var(--surface-2)}
.session-item.active{background:var(--surface-3);outline:1px solid var(--accent)}
.session-item .ses-icon{flex-shrink:0;font-size:.85rem}
.session-item .ses-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .ses-del{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:.65rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:var(--transition);flex-shrink:0}
.session-item:hover .ses-del{opacity:1}
.session-item .ses-del:hover{background:rgba(248,113,113,.2);color:var(--error)}
.session-item .ses-synced{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0}

/* Cloud sync status bar */
.sync-status{display:flex;align-items:center;gap:6px;padding:4px 14px;font-size:.68rem;color:var(--text-muted);border-top:1px solid var(--border);flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.synced{background:var(--success)}
.sync-dot.syncing{background:var(--warning);animation:pulse-sync 1s infinite}
.sync-dot.error{background:var(--error)}
.sync-dot.offline{background:var(--text-muted)}
@keyframes pulse-sync{0%,100%{opacity:.4}50%{opacity:1}}

/* Auth modal tabs */
.auth-tabs{display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.auth-tab{flex:1;padding:10px 0;text-align:center;font-size:.84rem;cursor:pointer;background:var(--surface-2);color:var(--text-secondary);border:none;transition:var(--transition);font-family:var(--font-sans)}
.auth-tab.active{background:var(--accent);color:#fff}
.auth-tab:hover:not(.active){background:var(--surface-3)}

/* VIP badge */
.vip-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:50px;font-size:.65rem;font-weight:600}
.vip-badge.free{background:rgba(107,107,128,.2);color:var(--text-muted)}
.vip-badge.pro{background:rgba(245,158,11,.2);color:#f59e0b}

/* Mobile auth/layout adjustments */
@media(max-width:768px){
  .user-area{padding:8px 12px}
  .user-area .user-email{font-size:.74rem}
  .session-item{padding:10px 12px;min-height:var(--touch-target)}
  .login-prompt{padding:10px 8px;font-size:.72rem}
  .login-prompt button{padding:10px}
  .sync-status{padding:6px 12px}
  .auth-tab{padding:12px 0;font-size:.8rem}
}

/* Modal forms — extra fields */
.form-hint{font-size:.72rem;color:var(--text-muted);margin-top:4px}
.form-error{font-size:.74rem;color:var(--error);margin-top:4px;display:none}

/* ===== RESPONSIVE — TABLET (≤900px) ===== */

@media(max-width:900px){
  :root{--sidebar-w:260px}
  .message{max-width:100%}
  .input-wrapper{max-width:100%}
}

/* ===== RESPONSIVE — MOBILE (≤768px) ===== */
@media(max-width:768px){
  :root{--sidebar-w:300px}

  /* Show hamburger */
  .hamburger{display:flex}

  /* Sidebar → overlay mode */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;
    width:var(--sidebar-w);min-width:var(--sidebar-w);
    max-width:85vw;height:100%;height:100dvh;
    transform:translateX(-100%);
    z-index:30;box-shadow:4px 0 24px rgba(0,0,0,.5);
    border-radius:0 var(--radius-lg) var(--radius-lg) 0;
    padding-top:var(--safe-top);
    will-change:transform;
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:block}

  /* Main area full-width */
  .main-area{width:100%}

  /* Active world bar — add hamburger */
  .active-world-bar{padding-left:8px;gap:6px;min-height:var(--touch-target)}
  .active-world-bar .aw-clear{padding:4px 10px;font-size:.72rem}

  /* Chat container */
  .chat-container{padding:12px;gap:12px}

  /* Messages */
  .message{gap:8px;max-width:100%}
  .message-avatar{width:30px;height:30px;font-size:.75rem}
  .message-bubble{padding:10px 13px;font-size:.88rem;border-radius:var(--radius)}
  .message.user .message-bubble{border-bottom-right-radius:4px}
  .message.assistant .message-bubble{border-bottom-left-radius:4px}
  .message-bubble pre{padding:10px 12px;font-size:.78rem}
  .message.assistant .message-bubble.novel-content{font-size:.9rem;line-height:1.8}

  /* Always show message actions on mobile (no hover) */
  .msg-actions{opacity:1}
  .msg-actions button{padding:4px 10px;font-size:.72rem}

  /* Input area — safe area aware */
  .input-area{padding:8px 12px calc(8px + var(--safe-bottom))}
  .input-row{gap:6px}
  .input-box textarea{font-size:.88rem;padding:10px 12px;min-height:44px}
  .input-expand-hint{display:none}
  .send-btn{width:var(--touch-target);height:var(--touch-target);font-size:1rem}
  .attach-btn{width:var(--touch-target);height:var(--touch-target)}

  /* File chips */
  .file-chip{font-size:.74rem;padding:4px 8px 4px 6px}

  /* Supplement bar */
  .sup-bar{padding:4px 10px;flex-wrap:wrap;gap:6px}
  .sup-bar .hamburger{margin-right:2px;flex-shrink:0}
  .sup-bar .sup-left{gap:4px}
  .sup-bar .sup-label{font-size:.72rem}
  .sup-bar .sup-chip{font-size:.7rem;padding:3px 8px;max-width:200px}
  .sup-bar .sup-add-row input{width:160px;font-size:.74rem}
  .sup-bar .sup-add-row input:focus{width:220px}
  .sup-bar .sup-chip.editing input{width:180px}

  /* Context bar */
  .context-bar{padding:3px 10px;font-size:.68rem;gap:6px}

  /* Sidebar header */
  .sidebar-header{padding:12px 14px;font-size:1rem}
  .sidebar-header .hamburger-close{
    display:flex;align-items:center;justify-content:center;
    width:var(--touch-target);height:var(--touch-target);
    border:none;background:transparent;color:var(--text-muted);
    font-size:1.1rem;cursor:pointer;border-radius:50%;
    margin-left:auto;transition:var(--transition);
    -webkit-tap-highlight-color:transparent;
  }
  .sidebar-header .hamburger-close:active{background:var(--surface-3);color:var(--text)}

  /* Sidebar items — bigger touch targets */
  .item-row{padding:10px 12px;font-size:.85rem;min-height:var(--touch-target)}
  .item-row .item-meta{font-size:.7rem}
  .item-row .item-actions{opacity:1}
  .item-actions button{width:28px;height:28px;font-size:.72rem}
  .item-row .expand-arrow{display:inline-block;margin-left:auto;color:var(--text-muted);font-size:.65rem}

  .archive-group{padding:8px 12px;font-size:.82rem;min-height:var(--touch-target)}
  .sub-item{padding:6px 10px;font-size:.76rem}
  .sub-item .sub-actions{opacity:1}
  .sub-item .sub-actions button{width:24px;height:24px;font-size:.65rem}

  .sidebar-footer{padding:10px 12px calc(10px + var(--safe-bottom));gap:6px}
  .sidebar-footer button{padding:10px 4px;font-size:.76rem;min-height:var(--touch-target)}

  /* Modals — full-width on mobile */
  .modal-overlay{align-items:flex-end;padding-bottom:var(--safe-bottom)}
  .modal{max-width:100%;width:100%;border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:20px 18px;max-height:85vh;max-height:85dvh;animation:slideUpMobile .3s ease}
  @keyframes slideUpMobile{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
  .modal h3{font-size:1rem;margin-bottom:10px}
  .modal p{font-size:.8rem}
  .form-row{flex-direction:column;gap:8px}
  .form-group{margin-bottom:10px}
  .form-group label{font-size:.76rem}
  .form-group input,.form-group select,.form-group textarea{font-size:.84rem;padding:8px 12px}
  .form-group textarea{min-height:60px}
  .form-group textarea.expandable.expanded{min-height:160px!important}
  .modal-actions{margin-top:14px;gap:8px;flex-wrap:wrap}
  .modal-actions .btn{padding:8px 16px;font-size:.82rem}
  .btn-sm{padding:6px 12px;font-size:.76rem}

  /* Color picker — bigger swatches */
  .color-picker label{width:32px;height:32px}

  /* Toast */
  .toast-container{top:auto;bottom:80px;right:10px;left:10px;gap:6px}
  .toast{max-width:100%;font-size:.8rem;padding:8px 14px}

  /* Welcome screen */
  .welcome-icon{width:56px;height:56px;font-size:1.4rem}
  .welcome h2{font-size:1.2rem}
  .welcome p{font-size:.82rem;padding:0 10px}

  /* Section headers in sidebar */
  .section-header{padding:10px 14px 6px;font-size:.72rem}
  .section-header button{width:30px;height:30px;font-size:.8rem}
  .item-list{padding:2px 8px 8px}
}

/* ===== RESPONSIVE — SMALL PHONE (≤400px) ===== */
@media(max-width:400px){
  :root{--sidebar-w:280px}
  .message-bubble{font-size:.84rem;padding:9px 11px}
  .message-bubble pre{font-size:.74rem;padding:8px 10px}
  .message-avatar{width:26px;height:26px;font-size:.7rem}
  .input-box textarea{font-size:.84rem}
  .modal{padding:16px 14px}
  .modal h3{font-size:.95rem}
}

/* ===== LANDSCAPE MOBILE ===== */
@media(max-width:900px) and (orientation:landscape){
  .sidebar{max-width:60vw}
  .chat-container{padding:8px 16px}
  .input-area{padding:6px 16px}
  .modal{max-height:90vh;max-height:90dvh}
}

/* ===== HIGH-DPI TOUCH SCREENS ===== */
@media(hover:none) and (pointer:coarse){
  /* Always-visible actions — no hover on touch devices */
  .item-row .item-actions,
  .sub-item .sub-actions,
  .msg-actions{opacity:1}

  /* Prevent iOS zoom on input focus */
  input[type="text"],input[type="password"],textarea,select{font-size:16px!important}

  /* Larger scrollbar for touch */
  ::-webkit-scrollbar{width:6px}
}
</style>
</head>
<body>

<!-- ==================== APP LAYOUT ==================== -->
<div class="app-layout">

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="8" fill="url(#g)"/>
      <path d="M8 18l4-8 4 6 4-8 4 10" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <defs><linearGradient id="g" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#7c5cfc"/><stop offset="1" stop-color="#f062a6"/></linearGradient></defs>
    </svg>
    QingH Studio
    <button class="hamburger-close" id="sidebarCloseBtn" title="关闭菜单" aria-label="关闭菜单">✕</button>
  </div>

  <!-- User area (shows when logged in) -->
  <div class="user-area" id="userArea" style="display:none">
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-info">
      <div class="user-email" id="userEmailDisplay"></div>
      <div class="user-vip" id="userVipDisplay"></div>
    </div>
    <button class="user-logout" id="btnLogout" title="退出登录">⏻</button>
  </div>
  <!-- Login prompt (shows when not logged in) -->
  <div class="login-prompt" id="loginPrompt">
    ☁️ 登录后同步聊天记录
    <button id="btnShowAuth">🔑 登录 / 注册</button>
  </div>

  <!-- Chat sessions section -->
  <div class="sidebar-section" id="sessionSection" style="display:none">
    <div class="section-header">
      <span>💬 对话记录</span>
      <button id="btnNewSession" title="新建对话">+</button>
    </div>
    <div class="item-list" id="sessionList"></div>
    <div class="sync-status" id="syncStatus">
      <span class="sync-dot offline" id="syncDot"></span>
      <span id="syncText">未登录</span>
    </div>
  </div>

  <!-- World-building section -->
  <div class="sidebar-section">
    <div class="section-header">
      <span>世界观</span>
      <div style="display:flex;gap:4px">
        <button id="btnImportWorld" title="从文件导入世界观" style="font-size:.75rem">📥</button>
        <button id="btnAddWorld" title="新建世界观">+</button>
      </div>
    </div>
    <input type="file" id="worldFileInput" accept=".txt,.md,.json" style="display:none">
    <div class="item-list" id="worldList"></div>
  </div>

  <!-- Character cards section -->
  <div class="sidebar-section">
    <div class="section-header">
      <span>角色卡</span>
      <div style="display:flex;gap:4px">
        <button id="btnImportChar" title="从文件导入角色卡" style="font-size:.75rem">📥</button>
        <button id="btnAddChar" title="新建角色卡">+</button>
      </div>
    </div>
    <input type="file" id="charFileInput" accept=".txt,.md" style="display:none">
    <div class="item-list" id="charList"></div>
  </div>

  <!-- Footer -->
  <div class="sidebar-footer">
    <button id="btnSettings" title="API 设置">⚙️ 设置</button>
    <button id="btnExport" title="导出对话为 TXT">📥 导出</button>
    <button id="btnClear" title="清空对话">🗑️ 清空</button>
  </div>
</aside>

<!-- Sidebar backdrop for mobile overlay -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- ===== MAIN AREA ===== -->
<main class="main-area">
  <!-- Active world indicator -->
  <div class="active-world-bar" id="activeWorldBar" style="display:none">
    <button class="hamburger" id="hamburgerBtn" title="菜单" aria-label="打开菜单">☰</button>
    <span>🌍</span>
    <span class="aw-dot" id="awDot"></span>
    <span class="aw-name" id="awName"></span>
    <span class="aw-chars" id="awChars"></span>
    <button class="aw-clear" id="awClear" title="取消选择世界观">✕ 取消</button>
  </div>

  <!-- Supplement bar — always visible, scrollable chip row -->
  <div class="sup-bar" id="supBar">
    <button class="hamburger" id="hamburgerBtn2" title="菜单" aria-label="打开菜单">☰</button>
    <span class="sup-left">
      <span class="sup-dot" id="supDot"></span>
      <span class="sup-label">补充设定</span>
    </span>
    <span class="sup-right">
      <span class="sup-chips-row" id="supChips"></span>
      <span class="sup-add-row">
        <input type="text" id="supInput" placeholder="新增设定…">
        <button id="spAdd" title="添加">+</button>
        <button class="sup-clear-all" id="spClearAll" title="清除全部">🗑️</button>
      </span>

  <!-- Chat -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">✨</div>
      <h2>欢迎使用 QingH Studio</h2>
      <p>左侧边栏管理<strong>世界观</strong>与<strong>角色卡</strong><br>可📥导入文件自动搭建 · 角色卡可归档到世界观<br>支持上传参考文件 · 完整上下文 · 导出对话</p>
      <p style="font-size:.78rem;color:var(--text-muted)">点击 ⚙️ 设置 API Key → 开始使用</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <div class="file-chips-row" id="fileChipsRow"></div>
      <div class="input-row">
        <button class="attach-btn" id="btnAttach" title="上传参考文件">📎</button>

        <div class="input-box">
          <textarea id="userInput" placeholder="输入消息… (Enter 发送, Ctrl+Enter 换行)" rows="1" autofocus></textarea>
          <span class="input-expand-hint">🖱 点击展开</span>
        </div>
        <button class="send-btn" id="btnSend" title="发送">➤</button>
      </div>

  <!-- Context bar -->
  <div class="context-bar">
    <span>💬 <span id="contextMsgCount">0</span></span><span>|</span>
    <span>📎 <span id="contextFileCount">0</span></span><span>|</span>
    <span>📖 <span id="contextWorld">无</span></span><span>|</span>
    <span><span class="context-dot" id="contextDot"></span> <span id="contextStatus"></span></span>
  </div>

// ==================== CLOUD API HELPERS ====================
async function cloudFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function cloudSyncAll() {
  if (!authToken || !currentSessionId) return;
  updateSyncStatus('syncing', '同步中…');
  try {
    // Push messages
    const msgsToSync = state.messages.filter(m => m.role !== 'system');
    await cloudFetch(`/sessions/${currentSessionId}/messages`, {
      method: 'POST', body: JSON.stringify({ messages: msgsToSync }),
    });
    // Push supplements
    if (state.supNote) {
      await cloudFetch(`/sessions/${currentSessionId}/supplements`, {
        method: 'POST', body: JSON.stringify({ notes: state.supNote.split('\n').filter(Boolean) }),
      });
    }
    // Push worlds & characters
    if (state.worlds.length > 0) {
      await cloudFetch('/worlds', { method: 'POST', body: JSON.stringify({ worlds: state.worlds }) });
    }
    if (state.characters.length > 0) {
      await cloudFetch('/characters', { method: 'POST', body: JSON.stringify({ characters: state.characters }) });
    }
    updateSyncStatus('synced', '已同步');
  } catch (e) {
    console.error('Sync error:', e);
    updateSyncStatus('error', '同步失败');
  }
}

async function cloudPull(loadMessages = false) {
  if (!authToken) return;
  try {
    // Pull worlds
    const worlds = await cloudFetch('/worlds');
    if (worlds.length > 0) {
      state.worlds = worlds.map(w => ({
        id: w.id, name: w.name, color: w.color || '#7c5cfc',
        description: w.description || '', createdAt: new Date(w.created_at).getTime()
      }));
    }
    // Pull characters
    const chars = await cloudFetch('/characters');
    if (chars.length > 0) {
      state.characters = chars.map(c => ({
        id: c.id, name: c.name, worldId: c.world_id || '',
        description: c.description || '', createdAt: new Date(c.created_at).getTime()
      }));
    }
    // Pull current session messages
    if (loadMessages && currentSessionId) {
      const msgs = await cloudFetch(`/sessions/${currentSessionId}/messages`);
      if (msgs.length > 0) {
        state.messages = msgs;
      }
      const notes = await cloudFetch(`/sessions/${currentSessionId}/supplements`);
      if (notes.length > 0) {
        state.supNote = notes.join('\n');
      }
    }
    saveAll(); renderWorlds(); renderChars(); renderAll(); updateUI();
    updateSyncStatus('synced', '已同步');
  } catch (e) {
    console.error('Pull error:', e);
    updateSyncStatus('error', '拉取失败');
  }
}

  if (password.length < 6) { dom.regError.textContent = '密码至少6位'; dom.regError.style.display = 'block'; return; }
  if (!email.includes('@')) { dom.regError.textContent = '邮箱格式不对'; dom.regError.style.display = 'block'; return; }

    await cloudPull(true);
  } catch (e) {
    dom.regError.textContent = e.message;
    dom.regError.style.display = 'block';
  }
}

async function doLogin() {
  const email = dom.loginEmail.value.trim();
  const password = dom.loginPassword.value;
  if (!email || !password) { dom.loginError.textContent = '请填写邮箱和密码'; dom.loginError.style.display = 'block'; return; }

  dom.loginError.style.display = 'none';
  try {
    const data = await cloudFetch('/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    authToken = data.token;
    authUser = data.user;
    localStorage.setItem('qingh_token', authToken);
    localStorage.setItem('qingh_user', JSON.stringify(authUser));
    // Sync stored API key to cloud if different
    if (state.apiKey && data.user.api_key !== state.apiKey) {
      cloudFetch('/user/api-key', {
        method: 'PUT',
        body: JSON.stringify({ api_key: state.apiKey, api_provider: state.apiProvider, model: state.model })
      }).catch(() => {});
    }
    // If user has a cloud API key and local is empty, pull it
    if (!state.apiKey && data.user.api_key) {
      state.apiKey = data.user.api_key;
      if (data.user.api_provider) state.apiProvider = data.user.api_provider;
      if (data.user.model) state.model = data.user.model;
      saveAll();
    }
    closeAuthModal();
    updateAuthUI();
    toast('登录成功！数据已同步 ☁️', 'success');
    await cloudPull(true);
    await loadCloudSessions();
  } catch (e) {
    dom.loginError.textContent = e.message;
    dom.loginError.style.display = 'block';
  }
}

function doLogout() {
  if (state.isLoading) { toast('AI 正在生成中，请先停止', 'info'); return; }
  confirm('退出登录后，本地数据不会丢失。再次登录会从云端拉回数据。\n\n确定退出？', () => {
    authToken = '';
    authUser = null;
    currentSessionId = '';
    localStorage.removeItem('qingh_token');
    localStorage.removeItem('qingh_user');
    localStorage.removeItem('qingh_session_id');
    cloudSessions = [];
    updateAuthUI();
    renderCloudSessions();
    toast('已退出登录', 'info');
  });
}

// ==================== CLOUD SESSIONS ====================
async function loadCloudSessions() {
  if (!authToken) return;
  try {
    cloudSessions = await cloudFetch('/sessions');
    renderCloudSessions();
    // If no current session, pick first one
    if (!currentSessionId && cloudSessions.length > 0) {
      currentSessionId = cloudSessions[0].id;
      localStorage.setItem('qingh_session_id', currentSessionId);
      await cloudPull(true);
      renderAll();
      updateUI();
    }
  } catch (e) { console.error('Load sessions error:', e); }
}

async function createCloudSession(title, mode) {
  if (!authToken) {
    // Local-only: just clear
    state.messages = [];
    saveAll();
    renderAll();
    updateUI();
    return;
  }
  try {
    const data = await cloudFetch('/sessions', {
      method: 'POST',
      body: JSON.stringify({ title: title || '新的对话', mode: mode || state.mode }),
    });
    cloudSessions.unshift(data);
    currentSessionId = data.id;
    localStorage.setItem('qingh_session_id', currentSessionId);
    // Clear local state
    state.messages = [];
    state.supNote = '';
    state.uploadedFiles = [];
    saveAll();
    renderAll();
    renderFileChips();
    updateUI();
    renderCloudSessions();
    toast('新对话已创建 ☁️', 'success');
  } catch (e) {
    toast('创建会话失败: ' + e.message, 'error');
  }
}

async function switchCloudSession(sessionId) {
  if (!authToken || !sessionId || sessionId === currentSessionId) return;
  // Save current first
  if (currentSessionId) {
    const msgsToSync = state.messages.filter(m => m.role !== 'system');
    if (msgsToSync.length > 0) {
      cloudFetch(`/sessions/${currentSessionId}/messages`, {
        method: 'POST', body: JSON.stringify({ messages: msgsToSync }),
      }).catch(() => {});
    }
  }
  currentSessionId = sessionId;
  localStorage.setItem('qingh_session_id', currentSessionId);
  // Clear local
  state.messages = [];
  state.supNote = '';
  state.uploadedFiles = [];
  saveAll();
  // Pull from cloud
  await cloudPull(true);
  renderAll();
  renderFileChips();
  updateUI();
  renderCloudSessions();
  toast('已切换对话', 'info');
}

async function deleteCloudSession(sessionId) {
  if (!authToken) return;
  try {
    await cloudFetch(`/sessions/${sessionId}`, { method: 'DELETE' });
    cloudSessions = cloudSessions.filter(s => s.id !== sessionId);
    if (currentSessionId === sessionId) {
      currentSessionId = cloudSessions[0]?.id || '';
      localStorage.setItem('qingh_session_id', currentSessionId);
      state.messages = [];
      state.supNote = '';
      saveAll();
      if (currentSessionId) await cloudPull(true);
    }
    renderCloudSessions();
    renderAll();
    updateUI();
    toast('对话已删除', 'info');
  } catch (e) {
    toast('删除失败: ' + e.message, 'error');
  }
}

function renderCloudSessions() {
  if (!dom.sessionList) return;
  dom.sessionList.innerHTML = '';
  if (!cloudSessions.length) {
    dom.sessionList.innerHTML = '<div class="empty-hint">还没有对话记录</div>';
    return;
  }
  cloudSessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    div.innerHTML = `
      <span class="ses-icon">💬</span>
      <span class="ses-name">${esc(s.title || '未命名')}</span>
      <span class="ses-synced" title="已同步"></span>
      <button class="ses-del" data-sid="${s.id}" title="删除">×</button>
    `;
    div.addEventListener('click', e => {
      if (e.target.closest('.ses-del')) {
        e.stopPropagation();
        confirm('确定删除这个对话吗？', () => deleteCloudSession(s.id));
      } else {
        switchCloudSession(s.id);
      }
    });
    dom.sessionList.appendChild(div);
  });
}

// Swipe gesture detection
let _swipeStartX=0,_swipeStartY=0,_swipeActive=false;
function initSwipeGestures(){
  const mainArea=document.querySelector('.main-area');
  mainArea.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeActive=true;
  },{passive:true});

  mainArea.addEventListener('touchend',e=>{
    if(!_swipeActive)return;
    _swipeActive=false;
    const dx=(e.changedTouches[0]?.clientX||_swipeStartX)-_swipeStartX;
    const dy=Math.abs((e.changedTouches[0]?.clientY||_swipeStartY)-_swipeStartY);
    // Right swipe from left edge → open sidebar
    if(dx>60&&Math.abs(dx)>dy&&_swipeStartX<30&&isMobile()){
      openSidebar();
    }
  },{passive:true});

  // Swipe left on sidebar → close
  dom.sidebar.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    _swipeStartX=e.touches[0].clientX;
    _swipeStartY=e.touches[0].clientY;
    _swipeActive=true;
  },{passive:true});

  dom.sidebar.addEventListener('touchend',e=>{
    if(!_swipeActive||!dom.sidebar.classList.contains('open'))return;
    _swipeActive=false;
    const dx=(e.changedTouches[0]?.clientX||_swipeStartX)-_swipeStartX;
    const dy=Math.abs((e.changedTouches[0]?.clientY||_swipeStartY)-_swipeStartY);
    if(dx<-50&&Math.abs(dx)>dy){
      closeSidebar();
    }
  },{passive:true});
}

// iOS Safari viewport height fix
function fixViewportHeight(){
  const vh=window.innerHeight*0.01;
  document.documentElement.style.setProperty('--vh',`${vh}px`);
  // Also fix app-layout height
  const appLayout=document.querySelector('.app-layout');
  if(appLayout) appLayout.style.height=window.innerHeight+'px';
}

function scrollToBottom(){
  requestAnimationFrame(()=>{
    dom.chatContainer.scrollTop=dom.chatContainer.scrollHeight;
  });
}

// Handle keyboard show/hide on mobile
function initKeyboardHandling(){
  const initialHeight=window.innerHeight;
  let lastHeight=initialHeight;
  window.addEventListener('resize',()=>{
    if(!isMobile())return;
    const newHeight=window.innerHeight;
    // Keyboard opened
    if(newHeight<lastHeight-100){
      fixViewportHeight();
      scrollToBottom();
    }
    // Keyboard closed
    if(newHeight>lastHeight+100){
      fixViewportHeight();
    }
    lastHeight=newHeight;
  });

  // Focus handling for input
  dom.userInput.addEventListener('focus',()=>{
    if(isMobile()){
      setTimeout(scrollToBottom,300);
    }
  });
}

// ==================== INIT ====================
function init(){
  populateSettings();
  loadState();
  if(!state.model) state.model=(PROVIDERS[state.apiProvider]||PROVIDERS.anthropic).defaultModel;
  updateUI();
  bindEvents();
  renderAll();
  renderWorlds();renderChars();
  // Auth / Cloud
  updateAuthUI();
  if (authToken && authUser) {
    loadCloudSessions();
    cloudPull(true);
  }
  // Mobile init
  fixViewportHeight();
  initSwipeGestures();
  initKeyboardHandling();
  window.addEventListener('resize',()=>{fixViewportHeight();if(!isMobile()){dom.sidebar.classList.remove('open');dom.sidebarBackdrop.style.display='none';document.body.style.overflow='';}});
  window.addEventListener('orientationchange',()=>{setTimeout(fixViewportHeight,100)});
  // Close sidebar when clicking a world/char item on mobile
  if(isMobile()) closeSidebar();
}

function populateSettings(){
  dom.apiProvider.innerHTML=Object.entries(PROVIDERS).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');
  dom.apiProvider.value=state.apiProvider;
  updateModelSelect();
}

function loadState(){
  try{
    const g=k=>localStorage.getItem(SK[k]);
    if(g('apiKey')) state.apiKey=g('apiKey');
    if(g('apiProvider')) state.apiProvider=g('apiProvider');
    if(g('baiduSecretKey')) state.baiduSecretKey=g('baiduSecretKey');
    if(g('customApiUrl')) state.customApiUrl=g('customApiUrl');
    if(g('model')) state.model=g('model');
    if(g('messages')) state.messages=JSON.parse(g('messages'));
    if(g('mode')) state.mode=g('mode');
    if(g('uploadedFiles')) state.uploadedFiles=JSON.parse(g('uploadedFiles'));
    if(g('worlds')) state.worlds=JSON.parse(g('worlds'));
    if(g('characters')) state.characters=JSON.parse(g('characters'));
    if(g('activeWorldId')) state.activeWorldId=g('activeWorldId');
    if(g('supNote')) state.supNote=g('supNote');
  }catch(e){console.error('加载失败:',e);state.messages=[];state.worlds=[];state.characters=[]}
}

function saveAll(){
  try{
    const s=(k,v)=>{if(v!==null&&v!==undefined&&v!=='')localStorage.setItem(SK[k],v);else localStorage.removeItem(SK[k])};
    s('apiKey',state.apiKey);s('apiProvider',state.apiProvider);
    s('baiduSecretKey',state.baiduSecretKey);s('customApiUrl',state.customApiUrl);
    s('model',state.model);s('messages',JSON.stringify(state.messages));
    s('mode',state.mode);s('uploadedFiles',JSON.stringify(state.uploadedFiles));
    s('worlds',JSON.stringify(state.worlds));s('characters',JSON.stringify(state.characters));
    s('activeWorldId',state.activeWorldId||'');s('supNote',state.supNote||'');
  }catch(e){toast('存储空间不足','error')}
}

// ==================== WORLD HELPERS ====================
function getWorld(id){return state.worlds.find(w=>w.id===id)}
function getWorldChars(worldId){return state.characters.filter(c=>c.worldId===worldId)}
function getWorldColor(id){const w=getWorld(id);return w?w.color:'#6b6b80'}

// ==================== RENDER SIDEBAR ====================
let _expandedArchives = new Set();

function renderWorlds(){
  dom.worldList.innerHTML='';
  if(!state.worlds.length){dom.worldList.innerHTML='<div class="empty-hint">还没有世界观<br>点击 + 或 📥 创建</div>';return}
  [...state.worlds].sort((a,b)=>a.createdAt-b.createdAt).forEach(w=>{
    const row=document.createElement('div');
    row.className='item-row'+(state.activeWorldId===w.id?' active':'');
    row.innerHTML=`
      <span class="item-dot" style="background:${w.color}"></span>
      <span class="item-name">${esc(w.name)}</span>
      <span class="item-actions">
        <button class="edit" data-id="${w.id}" title="编辑">✎</button>
        <button class="del" data-id="${w.id}" title="删除">×</button>
      </span>
    `;
    row.addEventListener('click',e=>{if(e.target.closest('button'))return;selectWorld(w.id)});
    row.querySelector('.edit').addEventListener('click',e=>{e.stopPropagation();openWorldModal(w.id)});
    row.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();deleteWorld(w.id)});
    dom.worldList.appendChild(row);
  });
}

function renderChars(){
  dom.charList.innerHTML='';
  if(!state.characters.length){dom.charList.innerHTML='<div class="empty-hint">还没有角色卡<br>点击 + 或 📥 创建</div>';return}

  // Group characters by world
  const worldGroups=new Map();
  const unarchived=[];
  state.characters.forEach(c=>{
    if(c.worldId) worldGroups.has(c.worldId)?worldGroups.get(c.worldId).push(c):worldGroups.set(c.worldId,[c]);
    else unarchived.push(c);
  });

  // Render archive groups first
  worldGroups.forEach((chars,worldId)=>{
    const w=getWorld(worldId);
    const worldName=w?w.name:'已删除的世界观';
    const color=w?w.color:'#555';
    const isOpen=_expandedArchives.has(worldId);

    const group=document.createElement('div');
    group.className='archive-group';
    group.innerHTML=`
      <span class="ag-bar" style="background:${color}"></span>
      <span class="ag-name">${esc(worldName)} 角色卡</span>
      <span class="ag-count">${chars.length}人</span>
    `;
    group.addEventListener('click',()=>{
      if(_expandedArchives.has(worldId)) _expandedArchives.delete(worldId);
      else _expandedArchives.add(worldId);
      renderChars();
    });
    dom.charList.appendChild(group);

    const sub=document.createElement('div');
    sub.className='sub-items'+(isOpen?' open':'');
    chars.forEach(c=>{
      const si=document.createElement('div');
      si.className='sub-item';
      si.innerHTML=`
        <span class="sub-dot" style="background:${color}"></span>
        <span class="sub-name">${esc(c.name)}</span>
        <span class="sub-actions">
          <button class="edit" data-cid="${c.id}" title="编辑">✎</button>
          <button class="del" data-cid="${c.id}" title="删除">×</button>
        </span>
      `;
      si.querySelector('.edit').addEventListener('click',e=>{e.stopPropagation();openCharModal(c.id)});
      si.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();deleteChar(c.id)});
      sub.appendChild(si);
    });
    dom.charList.appendChild(sub);
  });

  // Unarchived characters
  unarchived.forEach(c=>{
    const si=document.createElement('div');
    si.className='sub-item';
    si.style.cssText='margin:0;padding:6px 10px;font-size:.78rem;';
    si.innerHTML=`
      <span class="sub-dot" style="background:var(--text-muted)"></span>
      <span class="sub-name">${esc(c.name)}</span>
      <span class="sub-actions">
        <button class="edit" data-cid="${c.id}" title="编辑">✎</button>
        <button class="del" data-cid="${c.id}" title="删除">×</button>
      </span>
    `;
    si.querySelector('.edit').addEventListener('click',e=>{e.stopPropagation();openCharModal(c.id)});
    si.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();deleteChar(c.id)});
    dom.charList.appendChild(si);
  });
}

// ==================== WORLD CRUD ====================
function openWorldModal(editId){
  if(isMobile()) closeSidebar();
  dom.worldEditId.value=editId||'';
  dom.worldModalTitle.textContent=editId?'✏️ 编辑世界观':'🌍 新建世界观';
  dom.btnDeleteWorld.style.display=editId?'inline-block':'none';

  dom.worldColorPicker.innerHTML=WORLD_COLORS.map(c=>
    `<input type="radio" name="worldColor" value="${c}" id="wc_${c}" ${(!editId&&c===WORLD_COLORS[0])?'checked':''}><label for="wc_${c}" style="background:${c};color:${c}">●</label>`
  ).join('');

    const w=getWorld(editId);if(!w)return;

    dom.worldDesc.value=w.description||'';

  }else{
    dom.worldName.value='';dom.worldDesc.value='';
    dom.worldColorPicker.querySelector('input')?.setAttribute('checked','');
  }

function closeWorldModal(){dom.worldModal.style.display='none'}

function saveWorld(){
  const name=dom.worldName.value.trim();
  if(!name){toast('请输入世界观名称','error');return}
  const color=dom.worldColorPicker.querySelector('input:checked')?.value||WORLD_COLORS[0];
  const description=dom.worldDesc.value.trim();
  const editId=dom.worldEditId.value;

  if(editId){
    const w=state.worlds.find(w=>w.id===editId);if(w){w.name=name;w.color=color;w.description=description}
  }else{
    state.worlds.push({id:'w_'+Date.now(),name,color,description,createdAt:Date.now()});
  }
  saveAll();renderWorlds();updateUI();closeWorldModal();
  if (authToken) cloudFetch('/worlds', { method: 'POST', body: JSON.stringify({ worlds: state.worlds }) }).catch(() => {});
  toast(editId?'世界观已更新 ✅':'世界观已创建 ✅','success');
}

function deleteWorld(id){
  const w=getWorld(id);if(!w)return;
  const charCount=getWorldChars(id).length;
  let msg=`确定删除世界观「${w.name}」吗？`;
  if(charCount>0) msg+=`\n该世界观下有 ${charCount} 个角色卡，它们将变为"不限"世界观。`;
  confirm(msg,()=>{
    state.worlds=state.worlds.filter(w=>w.id!==id);
    // Unlink characters
    state.characters.forEach(c=>{if(c.worldId===id)c.worldId=''});
    if(state.activeWorldId===id) state.activeWorldId=null;
    saveAll();renderWorlds();updateUI();
    toast('世界观已删除','info');
  });
}

function deleteChar(id){

// ==================== FILE IMPORT → WORLD / CHARACTER ====================
async function importWorldFromFile(file){
  const text=await readText(file);
  if(!text||!text.trim()){toast('文件为空，无法导入','error');return}
  const parsed=parseImportText(text,file.name);
  // Open world modal pre-filled
  openWorldModal(null);
  dom.worldName.value=parsed.name||file.name.replace(/\.[^.]+$/,'');
  dom.worldDesc.value=parsed.description||parseImportDesc(text,parsed.name);
  if(parsed.color){
    const radio=dom.worldColorPicker.querySelector(`input[value="${parsed.color}"]`);
    if(radio) radio.checked=true;
  }
  toast(`📥 已解析「${file.name}」→ 请确认并保存世界观`,'info');
}

async function importCharFromFile(file){
  const text=await readText(file);
  if(!text||!text.trim()){toast('文件为空，无法导入','error');return}
  const parsed=parseImportText(text,file.name);
  // Open char modal pre-filled
  openCharModal(null);
  dom.charName.value=parsed.name||file.name.replace(/\.[^.]+$/,'');
  dom.charDesc.value=parsed.description||parseImportDesc(text,parsed.name);
  // Auto-select world if active
  if(state.activeWorldId) dom.charWorld.value=state.activeWorldId;
  toast(`📥 已解析「${file.name}」→ 请确认并保存角色卡`,'info');
}

function parseImportText(text,name){
  // Strategy 1: JSON
  const trimmed=text.trim();
  if(trimmed.startsWith('{')&&trimmed.endsWith('}')){
    try{
      const j=JSON.parse(trimmed);
      return{
        name:j.name||j.title||j.名称||j.标题||j.world||j.世界观||j.角色||j.character||'',
        description:j.description||j.desc||j.描述||j.content||j.setting||j.设定||j.背景||j.简介||j.summary||'',
        color:j.color||j.颜色||j.markColor||'',
      };
    }catch(e){/* fall through */}
  }

  // Strategy 2: Markdown — first # heading = name, rest = description
  const h1=trimmed.match(/^#\s+(.+?)(?:\r?\n|$)/m);
  const h2=trimmed.match(/^##\s+(.+?)(?:\r?\n|$)/m);
  const titleLine=trimmed.match(/^(.+?)(?:\r?\n|$)/);
  const colonMatch=trimmed.match(/^(?:名称|名字|name|标题|title|世界观|world|角色|character)\s*[:：]\s*(.+?)(?:\r?\n|$)/im);

  const parsedName=h1?h1[1].trim():colonMatch?colonMatch[1].trim():h2?h2[1].trim():titleLine?titleLine[1].trim().slice(0,40):'';
  const afterName=parsedName?trimmed.slice(trimmed.indexOf(parsedName)+parsedName.length).replace(/^[\s:=：-]+/,'').trim():trimmed;

  return{name:parsedName,description:afterName,color:''};
}

function parseImportDesc(text,name){
  // Strip the name heading, return the rest
  let t=text;
  if(name){const idx=t.indexOf(name);if(idx>=0)t=t.slice(idx+name.length)}
  return t.replace(/^[\s:=：\-#]+/,'').trim();
}

// ==================== SYSTEM PROMPT ====================
function buildSystemPrompt(){
  let base=state.mode==='novel'?DEFAULT_NOVEL_PROMPT:DEFAULT_CHAT_PROMPT;

  // Inject active world + its characters
  if(state.activeWorldId){
    const w=getWorld(state.activeWorldId);
    if(w){
      let ctx=`\n\n---\n## 🌍 当前世界观：${w.name}\n\n${w.description}`;
      const chars=getWorldChars(state.activeWorldId);
      if(chars.length>0){
        ctx+='\n\n### 👤 关联角色\n\n'+chars.map(c=>`**${c.name}**：${c.description}`).join('\n\n');
      }
      ctx+='\n\n---\n请严格基于以上世界观设定和角色信息进行创作。保持世界观和人物设定的一致性。';
      base+=ctx;
    }
  }

  // Inject supplement notes (persistent sticky context, numbered)
  const notes=getSupNotes();
  if(notes.length>0){
    base+=`\n\n---\n## 📝 用户补充设定（必须严格遵守，已累积${notes.length}条）\n\n`+notes.map((n,i)=>`${i+1}. ${n}`).join('\n')+`\n\n---\n请在每次回复时牢记并严格遵守以上补充设定。`;
  }

  return base;
}

function buildMessages(userMsg, fileContent){
  let content=userMsg;
  if(fileContent){
    content=`## 📎 本次上传的参考文件\n\n${fileContent}\n\n---\n## 💬 用户消息\n\n${userMsg}`;
  }
  return [{role:'system',content:buildSystemPrompt()},
    ...state.messages.filter(m=>m.role!=='system'),
    {role:'user',content}];
}

      case 'baidu':{const tr=await fetch(`https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${encodeURIComponent(key)}&client_secret=${encodeURIComponent(dom.baiduSecretKey.value.trim())}`,{method:'POST'});const td=await tr.json();if(td.error)throw new Error(td.error_description||td.error);const r=await fetch(`https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/${model}?access_token=${td.access_token}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msg})});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error_msg||r.status)}const d=await r.json();if(d.error_msg)throw new Error(d.error_msg);reply=d.result||'';break}
      default:{const url=getAPIUrl();const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model,messages:msg,max_tokens:60})});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||r.status)}const d=await r.json();reply=d.choices?.[0]?.message?.content||'';}

// ==================== SEND MESSAGE ====================
async function sendMessage(){
  const content=dom.userInput.value.trim();
  if(!content||state.isLoading) return;
  if(!state.apiKey){toast('请先设置 API Key','error');openSettings();return}
  if(state.apiProvider==='baidu'&&!state.baiduSecretKey){toast('百度需 Key + Secret','error');openSettings();return}

  dom.userInput.value='';dom.userInput.style.height='auto';dom.welcomeScreen.style.display='none';

  // Collect uploaded files → attach to this message, then clear
  const fileContent=state.uploadedFiles.filter(f=>f.content&&f.content.trim())
    .map(f=>`### 📄 ${f.name}\n${f.content}`).join('\n\n---\n\n');
  const displayContent=fileContent
    ?`📎 已附加 ${state.uploadedFiles.length} 个参考文件：${state.uploadedFiles.map(f=>f.name).join('、')}\n\n${content}`
    :content;

  const userIdx=state.messages.length;
  state.messages.push({role:'user',content:displayContent});saveAll();
  appendBubble('user',displayContent,userIdx);scrollBottom();updateUI();

  // Clear uploaded files now that they've been sent
  if(state.uploadedFiles.length>0){state.uploadedFiles=[];saveAll();renderFileChips();updateUI()}

  const typing=showTyping();
  state.isLoading=true;
  state._abortController=new AbortController();

  try{
    const reply=await callAPIWithAbort(buildMessages(content,fileContent),state._abortController.signal);
    removeTyping(typing);state.messages.push({role:'assistant',content:reply});
    saveAll();appendBubble('assistant',reply,state.messages.length-1);scrollBottom();updateUI();
    // Auto-sync if logged in
    if (authToken && currentSessionId) cloudSyncAll();
  }catch(e){
    removeTyping(typing);
    if(e.name==='AbortError'){return}
    console.error(e);toast('❌ '+e.message,'error');
  }
  finally{
    state.isLoading=false;state._abortController=null;dom.userInput.focus();
  }
}

async function callAPIWithAbort(messages,signal){
  const p=PROVIDERS[state.apiProvider];if(!p)throw new Error('未知提供商');
  switch(p.type){
    case 'anthropic': return callAnthropicWithAbort(messages,signal);
    case 'google': return callGoogleWithAbort(messages,signal);
    case 'baidu': return callBaiduWithAbort(messages,signal);
    default: return callOpenAICompatWithAbort(messages,signal);
  }
}

async function callAnthropicWithAbort(messages,signal){
  const sys=messages.find(m=>m.role==='system')?.content||'';
  const msgs=messages.filter(m=>m.role!=='system');
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',signal,
    headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:state.model,max_tokens:state.mode==='novel'?8192:4096,system:sys,
      messages:msgs.map(m=>({role:m.role,content:[{type:'text',text:m.content}]}))})});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(`Anthropic ${resp.status}: ${e.error?.message||'错误'}`)}
  const d=await resp.json();return d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
}

async function callGoogleWithAbort(messages,signal){
  const sys=messages.find(m=>m.role==='system');
  const body={contents:messages.filter(m=>m.role!=='system').map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}))};
  if(sys) body.systemInstruction={parts:[{text:sys.content}]};
  const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${state.model}:generateContent?key=${encodeURIComponent(state.apiKey)}`,{method:'POST',signal,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(`Gemini ${resp.status}: ${e.error?.message||'错误'}`)}
  const d=await resp.json();const t=d.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'';if(!t)throw new Error('Gemini 空响应');return t;
}

async function callBaiduWithAbort(messages,signal){
  if(!state.baiduAccessToken||Date.now()>state.baiduTokenExpiry){
    if(!state.baiduSecretKey) throw new Error('百度需 Secret Key');
    const tr=await fetch(`https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${encodeURIComponent(state.apiKey)}&client_secret=${encodeURIComponent(state.baiduSecretKey)}`,{method:'POST',signal});
    const td=await tr.json();if(td.error)throw new Error(`百度OAuth: ${td.error_description||td.error}`);
    state.baiduAccessToken=td.access_token;state.baiduTokenExpiry=Date.now()+(td.expires_in-60)*1000;
  }
  const sys=messages.find(m=>m.role==='system');
  const body={messages:messages.filter(m=>m.role!=='system').map(m=>({role:m.role,content:m.content}))};
  if(sys) body.system=sys.content;
  const resp=await fetch(`https://aip.baidubce.com/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/${state.model}?access_token=${state.baiduAccessToken}`,{method:'POST',signal,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(`百度 ${resp.status}: ${e.error_msg||'错误'}`)}
  const d=await resp.json();if(d.error_msg)throw new Error(d.error_msg);return d.result||'';
}

async function callOpenAICompatWithAbort(messages,signal){
  const url=getAPIUrl();
  const resp=await fetch(url,{method:'POST',signal,
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${state.apiKey}`},
    body:JSON.stringify({model:state.model,messages,max_tokens:state.mode==='novel'?8192:4096})});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(`${resp.status}: ${e.error?.message||'错误'}`)}
  const d=await resp.json();return d.choices?.[0]?.message?.content||'';
}

function editUserMessage(msgIndex){
  if(state.isLoading){toast('AI 正在生成中，请先停止','info');return}
  const msg=state.messages[msgIndex];
  if(!msg||msg.role!=='user') return;
  state.messages=state.messages.slice(0,msgIndex);
  saveAll();renderAll();updateUI();
  // Strip file attachment prefix, put clean content back in textarea
  let content=msg.content;
  const idx=content.indexOf('\n\n');
  if(content.startsWith('📎 已附加')&&idx>0) content=content.slice(idx+2);
  dom.userInput.value=content;
  dom.userInput.style.height='auto';
  dom.userInput.style.height=Math.min(dom.userInput.scrollHeight,180)+'px';
  dom.userInput.focus();
  toast('已进入编辑模式，重新上传文件请点 📎','info');
}

function stopGeneration(){
  if(!state.isLoading) return;
  if(state._abortController){state._abortController.abort();state._abortController=null}
  removeTyping(document.getElementById('typingIndicator'));
  state.isLoading=false;state.messages.push({role:'assistant',content:'[已暂停]'});
  saveAll();renderAll();updateUI();dom.userInput.focus();
  toast('已停止生成','info');
}

function getSupNotes(){return(state.supNote||'').split('\n').filter(Boolean)}

function addSupNote(val){
  const notes=getSupNotes();notes.push(val);
  state.supNote=notes.join('\n');saveAll();
  updateSupBar();renderAll();
  if (authToken && currentSessionId) syncSupNotes();
}

function updateSupNote(idx,val){
  const notes=getSupNotes();notes[idx]=val;
  state.supNote=notes.join('\n');saveAll();
  updateSupBar();renderAll();
  if (authToken && currentSessionId) syncSupNotes();
}

function removeSupNote(idx){
  const notes=getSupNotes();notes.splice(idx,1);
  state.supNote=notes.join('\n');saveAll();
  updateSupBar();renderAll();
  if(!notes.length) toast('补充设定已全部清除','info');
  if (authToken && currentSessionId) syncSupNotes();
}

function clearAllSupNotes(){
  state.supNote='';saveAll();
  updateSupBar();renderAll();
  if (authToken && currentSessionId) syncSupNotes();
  toast('已清除','info');
}

function saveSupNote(){
  const val=dom.supInput.value.trim();if(!val) return;
  addSupNote(val);
  dom.supInput.value='';dom.supInput.focus();
}

function startEditChip(idx){
  const notes=getSupNotes();
  const chip=dom.supChips.querySelector(`[data-si="${idx}"]`);
  if(!chip||chip.classList.contains('editing')) return;
  chip.classList.add('editing');
  chip.innerHTML=`
    <input type="text" value="${escAttr(notes[idx])}" data-si="${idx}">
    <button class="sc-ok" data-si="${idx}">✓</button>
    <button class="sc-cancel" data-si="${idx}">✕</button>
  `;
  const inp=chip.querySelector('input');inp.focus();inp.select();
  chip.querySelector('.sc-ok').addEventListener('click',e=>{e.stopPropagation();finishEditChip(idx,chip.querySelector('input').value.trim())});
  chip.querySelector('.sc-cancel').addEventListener('click',e=>{e.stopPropagation();cancelEditChip()});
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();finishEditChip(idx,inp.value.trim())}
    if(e.key==='Escape')cancelEditChip();
  });
  inp.addEventListener('click',e=>e.stopPropagation());
}

function finishEditChip(idx,val){
  if(val) updateSupNote(idx,val);
  else{removeSupNote(idx);return}
}

function cancelEditChip(){renderSupChips();updateSupBar()}

function renderSupChips(){
  const notes=getSupNotes();
  dom.supChips.innerHTML=notes.map((n,i)=>
    `<span class="sup-chip" data-si="${i}" title="点击编辑"><span class="sc-text">${esc(n)}</span><button class="sc-del" data-si="${i}" title="删除">×</button></span>`
  ).join('');
  dom.supChips.querySelectorAll('.sup-chip').forEach(chip=>{
    chip.addEventListener('click',e=>{
      if(e.target.closest('.sc-del')){e.stopPropagation();removeSupNote(+chip.dataset.si)}
      else startEditChip(+chip.dataset.si);
    });
  });
}

function updateSupBar(){
  const notes=getSupNotes();
  dom.supBar.classList.toggle('has',notes.length>0);
  dom.supDot.style.background=notes.length?'var(--accent-2)':'';
  renderSupChips();
}

// ==================== EXPORT TXT ====================
function exportTXT(){
  if(isMobile()) closeSidebar();
  const msgs=state.messages.filter(m=>m.role!=='system');
  if(!msgs.length){toast('没有可导出的对话','info');return}
  let txt='';
  // Header
  txt+=`QingH Studio 对话导出\n`;
  txt+=`导出时间：${new Date().toLocaleString()}\n`;
  txt+=`模式：${state.mode==='novel'?'小说创作':'AI对话'}\n`;
  if(state.activeWorldId){const w=getWorld(state.activeWorldId);if(w) txt+=`世界观：${w.name}\n`}
  txt+=`消息数：${msgs.length}\n`;
  txt+=`${'═'.repeat(50)}\n\n`;

  msgs.forEach((m,i)=>{
    const role=m.role==='user'?'👤 用户':'🤖 AI';
    txt+=`[${i+1}] ${role}\n`;
    txt+=`${'─'.repeat(40)}\n`;
    txt+=m.content+'\n\n';
  });

  txt+=`${'═'.repeat(50)}\n`;
  txt+=`— 由 QingH Studio 生成\n`;

  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`对话导出_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
  toast('对话已导出 ✅','success');
}
